<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08111d" />
    <title>Nano Harness</title>
    <style>
      :root {
        color-scheme: dark;
        background: #020604;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #020604;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .startup-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background:
          radial-gradient(circle at 50% 34%, rgba(67, 255, 157, 0.14), transparent 34%),
          linear-gradient(135deg, #020604 0%, #04110d 48%, #020806 100%);
        color: #e8fff5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-brand {
        display: grid;
        gap: 14px;
        place-items: center;
      }

      .startup-mark {
        display: grid;
        width: 72px;
        height: 72px;
        place-items: center;
        border: 1px solid rgba(67, 255, 157, 0.42);
        background: rgba(4, 18, 13, 0.82);
        box-shadow: 0 0 34px rgba(67, 255, 157, 0.12), 0 24px 70px rgba(0, 0, 0, 0.46);
        clip-path: polygon(0 14px, 14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
        color: #43ff9d;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.16em;
      }

      .startup-title {
        margin: 0;
        color: #91bda9;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-screen" aria-label="Nano Harness loading">
        <div class="startup-brand">
          <p class="startup-title">Nano Harness, loading...</p>
        </div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
