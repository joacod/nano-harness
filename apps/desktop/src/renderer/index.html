<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3f456f" />
    <title>Nano Harness</title>
    <style>
      :root {
        color-scheme: dark;
        background: oklch(31% 0.038 266deg);
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: oklch(31% 0.038 266deg);
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .startup-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background:
          radial-gradient(circle at 18% 0%, oklch(74% 0.11 288deg / 0.2), transparent 32%),
          radial-gradient(circle at 92% 8%, oklch(76% 0.105 188deg / 0.16), transparent 34%),
          linear-gradient(145deg, oklch(35% 0.045 268deg) 0%, oklch(29% 0.038 260deg) 50%, oklch(37% 0.036 236deg) 100%);
        color: oklch(94% 0.018 252deg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-brand {
        display: grid;
        gap: 14px;
        place-items: center;
      }

      .startup-mark {
        display: grid;
        width: 72px;
        height: 72px;
        place-items: center;
        border: 1px solid oklch(76% 0.14 288deg / 0.42);
        border-radius: 24px;
        background: oklch(39% 0.04 260deg / 0.82);
        box-shadow: 0 18px 48px oklch(18% 0.05 270deg / 0.28);
        color: oklch(76% 0.14 288deg);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.16em;
      }

      .startup-title {
        margin: 0;
        color: oklch(78% 0.032 252deg);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-screen" aria-label="Nano Harness loading">
        <div class="startup-brand">
          <p class="startup-title">Nano Harness, loading...</p>
        </div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
